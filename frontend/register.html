<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: url('pic1.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      width: 400px;
      text-align: center;
    }

    .container h2 { margin-bottom: 20px; font-size: 24px; color: #2c3e50; }

    .container input,
    .container select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .container button {
      width: 100%;
      padding: 12px;
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .container button:hover { background: #219150; }

    .link { margin-top: 15px; font-size: 14px; color: #555; }
    .link a { color: #27ae60; text-decoration: none; }
    .link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Register</h2>
    <form id="registerForm">
      <input type="text" id="fullname" placeholder="Full Name" required>
      <input type="text" id="phone" placeholder="Phone Number" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <select id="specialization" required>
        <option value="">Select Area of Specialization</option>
        <option value="Information Technology">Information Technology</option>
        <option value="Finance">Finance</option>
        <option value="Education">Education</option>
        <option value="Healthcare">Healthcare</option>
        <option value="Agriculture">Agriculture</option>
        <option value="Engineering">Engineering</option>
        <option value="Entrepreneurship">Entrepreneurship</option>
        <option value="Environmental Science">Environmental Science</option>
      </select>
      <button type="submit">Register</button>
    </form>
    <div class="link">
      <p>Already have an account? <a href="index.html">Login here</a></p>
    </div>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const data = {
        fullname: document.getElementById("fullname").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        specialization: document.getElementById("specialization").value
      };

      try {
        const res = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const text = await res.text();
        alert(text);

        if (text.includes("✅ Registration successful")) {
          window.location.href = "index.html"; // redirect to index.html after successful registration
        }
      } catch (err) {
        alert("❌ Error registering: " + err.message);
      }
    });
  </script>
</body>
</html>
